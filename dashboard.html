<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <meta http-equiv="Pragma" content="no-cache"/>
  <meta http-equiv="Expires" content="0"/>
  <title>Anomalias STCGYN — Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --eq-blue-dark:  #0a1628;
      --eq-blue-mid:   #1a56c4;
      --eq-cyan:       #00aaff;
      --eq-purple-mid: #7c3fc0;
      --eq-white:      #f0f4ff;
      --eq-gray:       #8a9bbf;
      --eq-error:      #ff4d6d;
      --eq-success:    #00e5a0;
      --eq-warning:    #ffb300;
      --nav-h:         64px;
      --top-h:         56px;
    }

    html, body {
      height: 100%; font-family: 'Barlow', sans-serif;
      background: var(--eq-blue-dark); color: var(--eq-white);
      overflow-x: hidden;
    }

    /* ── TOPBAR ── */
    .topbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      height: var(--top-h);
      background: rgba(10,22,40,0.97);
      border-bottom: 1px solid rgba(0,170,255,0.15);
      backdrop-filter: blur(16px);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px;
    }
    .topbar-logo { display: flex; align-items: center; gap: 8px; }
    .topbar-logo .icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--eq-blue-mid), var(--eq-purple-mid));
      border-radius: 8px; display: flex; align-items: center; justify-content: center;
    }
    .topbar-logo .icon svg { width: 16px; height: 16px; }
    .topbar-logo span {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 15px; font-weight: 700; letter-spacing: 1px;
      background: linear-gradient(90deg, #fff, var(--eq-cyan));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .topbar-right { display: flex; align-items: center; gap: 8px; }
    .avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: linear-gradient(135deg, var(--eq-blue-mid), var(--eq-purple-mid));
      display: flex; align-items: center; justify-content: center;
      font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700;
    }
    .btn-logout {
      background: none; border: 1px solid rgba(255,77,109,0.3);
      border-radius: 7px; padding: 6px 8px; color: var(--eq-error);
      cursor: pointer; font-size: 11px; font-weight: 600;
    }
    .btn-logout:hover { background: rgba(255,77,109,0.1); }

    /* ── CONTEÚDO ── */
    .content {
      margin-top: var(--top-h);
      margin-bottom: var(--nav-h);
      padding: 20px 16px;
    }

    .page-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 22px; font-weight: 700;
      background: linear-gradient(90deg, #fff, var(--eq-cyan));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .page-sub { font-size: 13px; color: var(--eq-gray); margin-top: 2px; margin-bottom: 20px; }

    /* ── KPI CARDS ── */
    .kpi-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px;
    }
    @media(min-width: 480px) { .kpi-grid { grid-template-columns: repeat(3, 1fr); } }

    .kpi-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px; padding: 16px 14px;
      display: flex; flex-direction: column; gap: 6px;
      transition: border-color .2s;
    }
    .kpi-card:hover { border-color: rgba(0,170,255,0.2); }
    .kpi-icon {
      width: 36px; height: 36px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center; font-size: 18px;
    }
    .kpi-val {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 30px; font-weight: 700; line-height: 1;
    }
    .kpi-label { font-size: 12px; color: var(--eq-gray); line-height: 1.3; }
    .kpi-delta {
      font-size: 11px; font-weight: 600; display: flex; align-items: center; gap: 3px;
    }
    .kpi-delta.up   { color: var(--eq-success); }
    .kpi-delta.down { color: var(--eq-error); }
    .kpi-delta.neutral { color: var(--eq-gray); }

    .kpi-card.trafo-insp  { border-left: 3px solid var(--eq-cyan); }
    .kpi-card.trafo-conc  { border-left: 3px solid var(--eq-success); }
    .kpi-card.podas       { border-left: 3px solid var(--eq-warning); }
    .kpi-card.espacadores { border-left: 3px solid var(--eq-purple-mid); }
    .kpi-card.pendentes   { border-left: 3px solid var(--eq-error); }
    .kpi-card.concluidos  { border-left: 3px solid var(--eq-success); }

    /* ── SEÇÃO GRÁFICO ── */
    .chart-section {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px; padding: 18px 16px; margin-bottom: 20px;
    }
    .chart-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px; flex-wrap: wrap; gap: 10px;
    }
    .chart-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 16px; font-weight: 700; letter-spacing: .5px;
    }

    /* período tabs */
    .periodo-tabs {
      display: flex; background: rgba(255,255,255,0.05);
      border-radius: 8px; padding: 3px; gap: 2px;
    }
    .periodo-tab {
      padding: 6px 12px; border-radius: 6px; cursor: pointer;
      font-size: 12px; font-weight: 600; border: none; background: transparent;
      color: var(--eq-gray); transition: all .2s;
    }
    .periodo-tab.active {
      background: linear-gradient(135deg, var(--eq-blue-mid), var(--eq-purple-mid));
      color: #fff;
    }

    /* date range */
    .date-range {
      display: none; gap: 8px; align-items: center; flex-wrap: wrap; margin-top: 8px;
    }
    .date-range.visible { display: flex; }
    .date-input {
      padding: 8px 12px; border-radius: 8px;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
      color: var(--eq-white); font-family: 'Barlow', sans-serif; font-size: 13px;
      outline: none; cursor: pointer;
    }
    .date-input:focus { border-color: var(--eq-cyan); }
    .date-input::-webkit-calendar-picker-indicator { filter: invert(1); opacity: .6; }
    .btn-aplicar {
      padding: 8px 16px; border-radius: 8px;
      background: linear-gradient(135deg, var(--eq-blue-mid), var(--eq-purple-mid));
      border: none; color: #fff; font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px; font-weight: 700; letter-spacing: .8px; text-transform: uppercase;
      cursor: pointer;
    }

    .chart-wrap { position: relative; height: 220px; }

    /* legenda customizada */
    .chart-legend {
      display: flex; gap: 16px; flex-wrap: wrap; margin-top: 12px;
    }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--eq-gray); }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

    /* ── RANKING FISCAIS ── */
    .ranking-section {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px; padding: 18px 16px; margin-bottom: 20px;
    }
    .ranking-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 16px; font-weight: 700; letter-spacing: .5px; margin-bottom: 14px;
    }
    .ranking-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .ranking-item:last-child { border-bottom: none; }
    .ranking-pos {
      width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700;
    }
    .ranking-pos.p1 { background: rgba(255,179,0,0.2); color: var(--eq-warning); border: 1px solid rgba(255,179,0,0.3); }
    .ranking-pos.p2 { background: rgba(138,155,191,0.15); color: var(--eq-gray); border: 1px solid rgba(138,155,191,0.2); }
    .ranking-pos.p3 { background: rgba(205,127,50,0.15); color: #cd7f32; border: 1px solid rgba(205,127,50,0.2); }
    .ranking-pos.pn { background: rgba(255,255,255,0.05); color: var(--eq-gray); border: 1px solid rgba(255,255,255,0.08); }
    .ranking-nome { flex: 1; font-size: 14px; font-weight: 500; }
    .ranking-stats { display: flex; gap: 10px; }
    .rstat { display: flex; flex-direction: column; align-items: center; gap: 1px; }
    .rstat-val { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 700; color: var(--eq-cyan); }
    .rstat-label { font-size: 9px; color: var(--eq-gray); text-transform: uppercase; letter-spacing: .4px; }

    /* ── TRANSFORMADORES FINALIZADOS ── */
    .trafo-section {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px; padding: 18px 16px; margin-bottom: 20px;
    }
    .trafo-section-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 16px; font-weight: 700; letter-spacing: .5px; margin-bottom: 14px;
    }
    .trafo-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
      gap: 10px;
    }
    .trafo-row:last-child { border-bottom: none; }
    .trafo-nome { font-size: 14px; font-weight: 500; flex: 1; }
    .trafo-pill {
      padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .4px; white-space: nowrap;
    }
    .trafo-pill.finalizado { background: rgba(0,229,160,0.12); color: var(--eq-success); border: 1px solid rgba(0,229,160,0.25); }
    .trafo-pill.pendente   { background: rgba(255,179,0,0.12); color: var(--eq-warning); border: 1px solid rgba(255,179,0,0.25); }

    /* ── BOTTOM NAV ── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000;
      height: var(--nav-h);
      background: rgba(10,22,40,0.97);
      border-top: 1px solid rgba(0,170,255,0.15);
      backdrop-filter: blur(16px);
      display: flex; align-items: center;
    }
    .nav-item {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 4px; padding: 8px 4px;
      cursor: pointer; border: none; background: none; color: var(--eq-gray);
      transition: color .2s; position: relative;
    }
    .nav-item.active { color: var(--eq-cyan); }
    .nav-item svg { width: 22px; height: 22px; }
    .nav-label { font-size: 10px; font-weight: 600; letter-spacing: .5px; text-transform: uppercase; }
    .nav-item.active::after {
      content: ''; position: absolute; top: 0; left: 20%; right: 20%; height: 2px;
      background: var(--eq-cyan); border-radius: 0 0 4px 4px;
    }
    .badge {
      position: absolute; top: 6px; right: calc(50% - 18px);
      background: var(--eq-error); color: #fff;
      font-size: 9px; font-weight: 700; min-width: 16px; height: 16px;
      border-radius: 8px; display: flex; align-items: center; justify-content: center; padding: 0 4px;
    }

    /* skeleton */
    .skeleton {
      background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 75%);
      background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 10px;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* toast */
    .toast {
      position: fixed; bottom: calc(var(--nav-h) + 16px); left: 50%;
      transform: translateX(-50%) translateY(20px); z-index: 3000;
      background: rgba(10,22,40,0.97); border-radius: 10px;
      padding: 12px 20px; font-size: 14px; font-weight: 500;
      border: 1px solid rgba(0,229,160,0.3); color: var(--eq-success);
      opacity: 0; transition: all .3s; white-space: nowrap;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.error { border-color: rgba(255,77,109,0.3); color: var(--eq-error); }
  </style>
</head>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAuzI6L_8FZhZxt1FyJd-Cw0wA3kvPdWzI",
    authDomain: "anomalias-stcgyn.firebaseapp.com",
    projectId: "anomalias-stcgyn",
    storageBucket: "anomalias-stcgyn.firebasestorage.app",
    messagingSenderId: "247707729519",
    appId: "1:247707729519:web:c3dcaf6d9e707fee59979a"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  let anomalias  = [];
  let inspecoes  = [];
  let circuitos  = [];
  let chartInst  = null;
  let periodoAtivo = 'diario';
  let customInicio = null;
  let customFim    = null;

  // Chart.js defaults
  Chart.defaults.color = '#8a9bbf';
  Chart.defaults.font.family = 'Barlow';

  onAuthStateChanged(auth, async user => {
    if (!user) { window.location.href = 'index.html'; return; }
    const snap = await getDoc(doc(db, 'usuarios', user.uid));
    if (!snap.exists()) { await signOut(auth); sessionStorage.removeItem('userPerfil'); window.location.href = 'index.html'; return; }
    const data = snap.data();
    sessionStorage.setItem('userPerfil', 'admin');
    if (data.perfil !== 'admin') { window.location.href = 'mapa.html'; return; }
    document.getElementById('avatarEl').textContent = data.nome.charAt(0).toUpperCase();

    await carregarDados();
  });

  window.logout = async () => { await signOut(auth); sessionStorage.removeItem('userPerfil'); window.location.href = 'index.html'; };

  async function carregarDados() {
    const [anoSnap, inspSnap, circSnap] = await Promise.all([
      getDocs(collection(db, 'anomalias')),
      getDocs(collection(db, 'inspecoes')),
      getDocs(collection(db, 'circuitos'))
    ]);

    anomalias = anoSnap.docs.map(d => ({ id: d.id, ...d.data() }));
    inspecoes = inspSnap.docs.map(d => ({ id: d.id, ...d.data() }));
    circuitos = circSnap.docs.map(d => ({ id: d.id, ...d.data() }));

    renderKPIs();
    renderGrafico();
    renderRanking();
    renderTrafo();
    await carregarBadgePendencias();
  }

  // ── KPIs ──
  function renderKPIs() {
    const trafoInsp  = inspecoes.length;
    const trafoConc  = inspecoes.filter(i => i.status === 'concluido').length;
    const podas      = anomalias.filter(a => a.tipo === 'poda' && a.status === 'concluido').length;
    const espacadores= anomalias.filter(a => a.tipo === 'espacador' && a.status === 'concluido').length;
    const pendentes  = anomalias.filter(a => a.status === 'pendente').length;
    const concluidos = anomalias.filter(a => a.status === 'concluido').length;

    // trafo finalizados = inspecionados E sem anomalias pendentes
    const trafoFinaliz = circuitos.filter(c => {
      const insp = inspecoes.find(i => i.circuitoId === c.id && i.status === 'concluido');
      const temPendente = anomalias.some(a => a.circuitoId === c.id && a.status === 'pendente');
      return insp && !temPendente;
    }).length;

    document.getElementById('kpiGrid').innerHTML = `
      <div class="kpi-card trafo-insp">
        <div class="kpi-icon" style="background:rgba(0,170,255,0.1)">⚡</div>
        <div class="kpi-val" style="color:var(--eq-cyan)">${trafoInsp}</div>
        <div class="kpi-label">Transformadores inspecionados</div>
      </div>
      <div class="kpi-card trafo-conc">
        <div class="kpi-icon" style="background:rgba(0,229,160,0.1)">✅</div>
        <div class="kpi-val" style="color:var(--eq-success)">${trafoFinaliz}</div>
        <div class="kpi-label">Transformadores finalizados</div>
      </div>
      <div class="kpi-card podas">
        <div class="kpi-icon" style="background:rgba(255,179,0,0.1)">✂️</div>
        <div class="kpi-val" style="color:var(--eq-warning)">${podas}</div>
        <div class="kpi-label">Podas executadas</div>
      </div>
      <div class="kpi-card espacadores">
        <div class="kpi-icon" style="background:rgba(124,63,192,0.1)">⊕</div>
        <div class="kpi-val" style="color:#bf7fff">${espacadores}</div>
        <div class="kpi-label">Espaçadores instalados</div>
      </div>
      <div class="kpi-card pendentes">
        <div class="kpi-icon" style="background:rgba(255,77,109,0.1)">⏳</div>
        <div class="kpi-val" style="color:var(--eq-error)">${pendentes}</div>
        <div class="kpi-label">Serviços pendentes</div>
      </div>
      <div class="kpi-card concluidos">
        <div class="kpi-icon" style="background:rgba(0,229,160,0.1)">🔧</div>
        <div class="kpi-val" style="color:var(--eq-success)">${concluidos}</div>
        <div class="kpi-label">Serviços concluídos</div>
      </div>`;
  }

  // ── GRÁFICO ──
  window.setPeriodo = function(periodo, btn) {
    periodoAtivo = periodo;
    document.querySelectorAll('.periodo-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const dr = document.getElementById('dateRange');
    dr.classList.toggle('visible', periodo === 'custom');
    if (periodo !== 'custom') renderGrafico();
  };

  window.aplicarPeriodo = function() {
    customInicio = document.getElementById('dataInicio').value;
    customFim    = document.getElementById('dataFim').value;
    if (!customInicio || !customFim) return showToast('Selecione as duas datas.', true);
    renderGrafico();
  };

  function renderGrafico() {
    const concluidas = anomalias.filter(a => a.status === 'concluido' && a.concluidoEm);
    const registradas = anomalias.filter(a => a.criadoEm);

    let labels = [], podaData = [], espacData = [], conclData = [];

    if (periodoAtivo === 'diario') {
      // últimos 7 dias
      const hoje = new Date();
      for (let i = 6; i >= 0; i--) {
        const d = new Date(hoje); d.setDate(d.getDate() - i);
        const label = d.toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit' });
        labels.push(label);
        const ds = d.toDateString();
        podaData.push(registradas.filter(a => a.tipo === 'poda' && a.criadoEm?.toDate?.()?.toDateString() === ds).length);
        espacData.push(registradas.filter(a => a.tipo === 'espacador' && a.criadoEm?.toDate?.()?.toDateString() === ds).length);
        conclData.push(concluidas.filter(a => a.concluidoEm?.toDate?.()?.toDateString() === ds).length);
      }
    } else if (periodoAtivo === 'mensal') {
      // últimos 6 meses
      const hoje = new Date();
      for (let i = 5; i >= 0; i--) {
        const d = new Date(hoje.getFullYear(), hoje.getMonth() - i, 1);
        const label = d.toLocaleDateString('pt-BR', { month:'short', year:'2-digit' });
        labels.push(label);
        const m = d.getMonth(); const y = d.getFullYear();
        const mesMatch = a => { const dt = a.criadoEm?.toDate?.(); return dt && dt.getMonth() === m && dt.getFullYear() === y; };
        const mesConc  = a => { const dt = a.concluidoEm?.toDate?.(); return dt && dt.getMonth() === m && dt.getFullYear() === y; };
        podaData.push(registradas.filter(a => a.tipo === 'poda' && mesMatch(a)).length);
        espacData.push(registradas.filter(a => a.tipo === 'espacador' && mesMatch(a)).length);
        conclData.push(concluidas.filter(mesConc).length);
      }
    } else if (periodoAtivo === 'custom' && customInicio && customFim) {
      // período personalizado — agrupa por dia
      const ini = new Date(customInicio + 'T00:00:00');
      const fim = new Date(customFim + 'T23:59:59');
      const dias = Math.ceil((fim - ini) / 86400000) + 1;
      for (let i = 0; i < Math.min(dias, 31); i++) {
        const d = new Date(ini); d.setDate(d.getDate() + i);
        labels.push(d.toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit' }));
        const ds = d.toDateString();
        podaData.push(registradas.filter(a => a.tipo === 'poda' && a.criadoEm?.toDate?.()?.toDateString() === ds).length);
        espacData.push(registradas.filter(a => a.tipo === 'espacador' && a.criadoEm?.toDate?.()?.toDateString() === ds).length);
        conclData.push(concluidas.filter(a => a.concluidoEm?.toDate?.()?.toDateString() === ds).length);
      }
    }

    if (chartInst) chartInst.destroy();

    const ctx = document.getElementById('chartExecucoes').getContext('2d');
    chartInst = new Chart(ctx, {
      type: 'bar',
      data: {
        labels,
        datasets: [
          {
            label: 'Podas',
            data: podaData,
            backgroundColor: 'rgba(255,179,0,0.75)',
            borderColor: '#ffb300',
            borderWidth: 1, borderRadius: 4
          },
          {
            label: 'Espaçadores',
            data: espacData,
            backgroundColor: 'rgba(0,170,255,0.75)',
            borderColor: '#00aaff',
            borderWidth: 1, borderRadius: 4
          },
          {
            label: 'Conclusões',
            data: conclData,
            backgroundColor: 'rgba(0,229,160,0.75)',
            borderColor: '#00e5a0',
            borderWidth: 1, borderRadius: 4
          }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: 'rgba(10,22,40,0.95)',
            borderColor: 'rgba(0,170,255,0.2)', borderWidth: 1,
            titleFont: { family: 'Barlow Condensed', size: 14, weight: 700 },
            bodyFont: { family: 'Barlow', size: 13 },
            padding: 10
          }
        },
        scales: {
          x: {
            grid: { color: 'rgba(255,255,255,0.04)' },
            ticks: { font: { size: 11 }, maxRotation: 45 }
          },
          y: {
            beginAtZero: true, grid: { color: 'rgba(255,255,255,0.06)' },
            ticks: { stepSize: 1, font: { size: 11 } }
          }
        }
      }
    });
  }

  // ── RANKING FISCAIS ──
  async function renderRanking() {
    // agrupa anomalias por fiscal
    const fiscaisMap = {};
    for (const a of anomalias) {
      if (!a.fiscalId) continue;
      if (!fiscaisMap[a.fiscalId]) {
        fiscaisMap[a.fiscalId] = { nome: a.fiscalNome || '—', total: 0, podas: 0, espacadores: 0 };
      }
      fiscaisMap[a.fiscalId].total++;
      if (a.tipo === 'poda') fiscaisMap[a.fiscalId].podas++;
      if (a.tipo === 'espacador') fiscaisMap[a.fiscalId].espacadores++;
    }

    const ranking = Object.values(fiscaisMap).sort((a, b) => b.total - a.total);
    const el = document.getElementById('rankingFiscais');

    if (!ranking.length) {
      el.innerHTML = '<p style="color:var(--eq-gray);font-size:13px;padding:8px 0">Nenhum registro ainda.</p>';
      return;
    }

    el.innerHTML = ranking.map((f, i) => {
      const posClass = ['p1','p2','p3'][i] || 'pn';
      return `<div class="ranking-item">
        <div class="ranking-pos ${posClass}">${i + 1}</div>
        <div class="ranking-nome">${f.nome}</div>
        <div class="ranking-stats">
          <div class="rstat">
            <div class="rstat-val">${f.total}</div>
            <div class="rstat-label">Total</div>
          </div>
          <div class="rstat">
            <div class="rstat-val" style="color:var(--eq-warning)">${f.podas}</div>
            <div class="rstat-label">Podas</div>
          </div>
          <div class="rstat">
            <div class="rstat-val" style="color:#bf7fff">${f.espacadores}</div>
            <div class="rstat-label">Espaç.</div>
          </div>
        </div>
      </div>`;
    }).join('');
  }

  // ── TRANSFORMADORES STATUS ──
  function renderTrafo() {
    const el = document.getElementById('listaTrafo');
    if (!circuitos.length) {
      el.innerHTML = '<p style="color:var(--eq-gray);font-size:13px;padding:8px 0">Nenhum circuito cadastrado.</p>';
      return;
    }

    el.innerHTML = circuitos.map(c => {
      const insp = inspecoes.find(i => i.circuitoId === c.id && i.status === 'concluido');
      const temPendente = anomalias.some(a => a.circuitoId === c.id && a.status === 'pendente');
      const finalizado = insp && !temPendente;

      return `<div class="trafo-row">
        <div class="trafo-nome">${c.nome || c.id}</div>
        <span class="trafo-pill ${finalizado ? 'finalizado' : 'pendente'}">
          ${finalizado ? '✓ Finalizado' : '⏳ Pendente'}
        </span>
      </div>`;
    }).join('');
  }

  async function carregarBadgePendencias() {
    const badge = document.getElementById('badgePendencias');
    badge.style.display = 'none';
    // dashboard só é acessível pelo admin
    const snap = await getDocs(query(collection(db, 'inspecoes'), where('status', '==', 'pendente')));
    if (snap.size > 0) {
      badge.textContent = snap.size;
      badge.style.display = 'flex';
    }
  }

  window.showToast = function(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast' + (isError ? ' error' : '') + ' show';
    setTimeout(() => t.classList.remove('show'), 3000);
  };

  if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(() => {});
</script>
