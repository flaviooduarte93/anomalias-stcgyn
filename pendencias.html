<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <meta http-equiv="Pragma" content="no-cache"/>
  <meta http-equiv="Expires" content="0"/>
  <title>Anomalias STCGYN — Pendências</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --eq-blue-dark:  #0a1628;
      --eq-blue-mid:   #1a56c4;
      --eq-cyan:       #00aaff;
      --eq-purple-mid: #7c3fc0;
      --eq-white:      #f0f4ff;
      --eq-gray:       #8a9bbf;
      --eq-error:      #ff4d6d;
      --eq-success:    #00e5a0;
      --eq-warning:    #ffb300;
      --nav-h:         64px;
      --top-h:         56px;
    }

    html, body {
      height: 100%; font-family: 'Barlow', sans-serif;
      background: var(--eq-blue-dark); color: var(--eq-white);
      overflow-x: hidden;
    }

    /* ── TOPBAR ── */
    .topbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      height: var(--top-h);
      background: rgba(10,22,40,0.97);
      border-bottom: 1px solid rgba(0,170,255,0.15);
      backdrop-filter: blur(16px);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px; gap: 10px;
    }
    .topbar-logo { display: flex; align-items: center; gap: 8px; }
    .topbar-logo .icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--eq-blue-mid), var(--eq-purple-mid));
      border-radius: 8px; display: flex; align-items: center; justify-content: center;
    }
    .topbar-logo .icon svg { width: 16px; height: 16px; }
    .topbar-logo span {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 15px; font-weight: 700; letter-spacing: 1px;
      background: linear-gradient(90deg, #fff, var(--eq-cyan));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .topbar-right { display: flex; align-items: center; gap: 8px; }
    .avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: linear-gradient(135deg, var(--eq-blue-mid), var(--eq-purple-mid));
      display: flex; align-items: center; justify-content: center;
      font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700;
    }
    .btn-logout {
      background: none; border: 1px solid rgba(255,77,109,0.3);
      border-radius: 7px; padding: 6px 8px; color: var(--eq-error);
      cursor: pointer; font-size: 11px; font-weight: 600;
    }
    .btn-logout:hover { background: rgba(255,77,109,0.1); }

    /* ── CONTEÚDO ── */
    .content {
      margin-top: var(--top-h);
      margin-bottom: var(--nav-h);
      padding: 20px 16px;
    }

    .page-header { margin-bottom: 20px; }
    .page-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 22px; font-weight: 700;
      background: linear-gradient(90deg, #fff, var(--eq-cyan));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .page-sub { font-size: 13px; color: var(--eq-gray); margin-top: 2px; }

    /* ── FILTROS (admin) ── */
    .filtros {
      display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto;
      padding-bottom: 4px; scrollbar-width: none;
    }
    .filtros::-webkit-scrollbar { display: none; }
    .filtro-btn {
      padding: 7px 14px; border-radius: 20px; white-space: nowrap;
      font-family: 'Barlow', sans-serif; font-size: 13px; font-weight: 600;
      cursor: pointer; border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05); color: var(--eq-gray);
      transition: all .2s;
    }
    .filtro-btn.active {
      background: rgba(0,170,255,0.12); border-color: rgba(0,170,255,0.35);
      color: var(--eq-cyan);
    }

    /* ── SUMÁRIO ── */
    .summary-row {
      display: flex; gap: 10px; margin-bottom: 20px;
    }
    .summary-card {
      flex: 1; background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px; padding: 14px 12px;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
    }
    .summary-card.pendente { border-color: rgba(255,179,0,0.2); }
    .summary-card.concluido { border-color: rgba(0,229,160,0.2); }
    .summary-val {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 28px; font-weight: 700;
    }
    .summary-card.pendente .summary-val { color: var(--eq-warning); }
    .summary-card.concluido .summary-val { color: var(--eq-success); }
    .summary-card.total .summary-val { color: var(--eq-cyan); }
    .summary-label { font-size: 11px; color: var(--eq-gray); text-transform: uppercase; letter-spacing: .6px; text-align: center; }

    /* ── SECTION HEADER ── */
    .section-header {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;
    }
    .section-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 14px; font-weight: 700; letter-spacing: .8px;
      color: var(--eq-gray); text-transform: uppercase;
    }
    .count-pill {
      background: rgba(0,170,255,0.1); border: 1px solid rgba(0,170,255,0.2);
      border-radius: 20px; padding: 2px 10px;
      font-size: 12px; font-weight: 700; color: var(--eq-cyan);
    }

    /* ── CARD INSPEÇÃO ── */
    .insp-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px; padding: 16px;
      margin-bottom: 10px; cursor: pointer;
      transition: all .2s; position: relative; overflow: hidden;
    }
    .insp-card:hover { border-color: rgba(0,170,255,0.25); transform: translateY(-1px); }
    .insp-card.pendente { border-left: 3px solid var(--eq-warning); }
    .insp-card.concluido { border-left: 3px solid var(--eq-success); }

    /* indicador de urgência */
    .insp-card.urgente::after {
      content: ''; position: absolute; top: 0; right: 0;
      width: 0; height: 0;
      border-style: solid;
      border-width: 0 20px 20px 0;
      border-color: transparent var(--eq-error) transparent transparent;
    }

    .insp-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 10px; }
    .insp-nome {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 18px; font-weight: 700; line-height: 1.2;
      background: linear-gradient(90deg, #fff, var(--eq-cyan));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    .status-pill {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 4px 10px; border-radius: 20px; flex-shrink: 0;
      font-size: 11px; font-weight: 700; letter-spacing: .4px; text-transform: uppercase;
    }
    .status-pill.pendente  { background: rgba(255,179,0,0.12);  color: var(--eq-warning); border: 1px solid rgba(255,179,0,0.25); }
    .status-pill.concluido { background: rgba(0,229,160,0.12); color: var(--eq-success); border: 1px solid rgba(0,229,160,0.25); }

    .insp-meta { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 12px; }
    .meta-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--eq-gray); }
    .meta-item svg { width: 13px; height: 13px; flex-shrink: 0; }
    .meta-item span { color: var(--eq-white); }

    /* dias em aberto */
    .dias-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 8px; border-radius: 6px;
      font-size: 11px; font-weight: 700;
    }
    .dias-badge.ok      { background: rgba(0,229,160,0.1);  color: var(--eq-success); }
    .dias-badge.alerta  { background: rgba(255,179,0,0.12); color: var(--eq-warning); }
    .dias-badge.critico { background: rgba(255,77,109,0.12); color: var(--eq-error); }

    .insp-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn-sm {
      padding: 8px 14px; border-radius: 8px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px; font-weight: 700; letter-spacing: .8px; text-transform: uppercase;
      cursor: pointer; border: none; transition: opacity .2s, transform .15s;
      display: flex; align-items: center; gap: 6px;
    }
    .btn-sm:active { transform: scale(.97); }
    .btn-primary-sm  { background: linear-gradient(135deg, var(--eq-blue-mid), var(--eq-purple-mid)); color: #fff; }
    .btn-outline-sm  { background: transparent; border: 1px solid rgba(0,170,255,0.3); color: var(--eq-cyan); }
    .btn-success-sm  { background: linear-gradient(135deg, #1a8c4e, #0d6e3b); color: #fff; }
    .btn-warning-sm  { background: transparent; border: 1px solid rgba(255,179,0,0.3); color: var(--eq-warning); }
    .btn-sm:hover { opacity: .85; }

    /* ── EMPTY STATE ── */
    .empty {
      text-align: center; padding: 60px 20px; color: var(--eq-gray);
    }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty p { font-size: 14px; line-height: 1.6; }
    .empty strong { color: var(--eq-success); }

    /* ── MODAL CONCLUIR INSPEÇÃO ── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 2000;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
      display: flex; align-items: flex-end; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity .3s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      width: 100%; max-width: 520px;
      background: #0d1f3c;
      border: 1px solid rgba(0,170,255,0.2);
      border-radius: 20px 20px 0 0;
      padding: 24px 20px 32px;
      transform: translateY(100%); transition: transform .35s cubic-bezier(.16,1,.3,1);
      max-height: 85vh; overflow-y: auto;
    }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal-handle { width: 40px; height: 4px; background: rgba(255,255,255,0.15); border-radius: 2px; margin: 0 auto 20px; }
    .modal-title {
      font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 700; margin-bottom: 6px;
      background: linear-gradient(90deg, #fff, var(--eq-cyan));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .modal-sub { font-size: 13px; color: var(--eq-gray); margin-bottom: 20px; line-height: 1.5; }

    .checklist { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
    .check-item {
      display: flex; align-items: center; gap: 12px;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px; padding: 12px 14px; cursor: pointer;
      transition: all .2s;
    }
    .check-item.checked {
      background: rgba(0,229,160,0.06); border-color: rgba(0,229,160,0.2);
    }
    .check-box {
      width: 20px; height: 20px; border-radius: 6px; flex-shrink: 0;
      border: 2px solid rgba(255,255,255,0.2);
      display: flex; align-items: center; justify-content: center;
      transition: all .2s;
    }
    .check-item.checked .check-box {
      background: var(--eq-success); border-color: var(--eq-success);
    }
    .check-text { font-size: 14px; font-weight: 500; }

    .obs-area {
      width: 100%; padding: 12px 14px; min-height: 80px;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px; color: var(--eq-white); font-family: 'Barlow', sans-serif;
      font-size: 14px; resize: none; outline: none;
    }
    .obs-area:focus { border-color: var(--eq-cyan); }
    .obs-area::placeholder { color: rgba(138,155,191,0.5); }

    .modal-actions { display: flex; gap: 10px; margin-top: 16px; }
    .btn-cancel {
      flex: 1; padding: 13px;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px; color: var(--eq-gray);
      font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase; cursor: pointer;
    }
    .btn-cancel:hover { background: rgba(255,255,255,0.1); }
    .btn-save {
      flex: 2; padding: 13px;
      background: linear-gradient(135deg, #1a8c4e, #0d6e3b);
      border: none; border-radius: 10px; color: #fff;
      font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase; cursor: pointer;
    }
    .btn-save:disabled { opacity: .5; cursor: not-allowed; }

    /* ── BOTTOM NAV ── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000;
      height: var(--nav-h);
      background: rgba(10,22,40,0.97);
      border-top: 1px solid rgba(0,170,255,0.15);
      backdrop-filter: blur(16px);
      display: flex; align-items: center;
    }
    .nav-item {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 4px; padding: 8px 4px;
      cursor: pointer; border: none; background: none; color: var(--eq-gray);
      transition: color .2s; position: relative;
    }
    .nav-item.active { color: var(--eq-cyan); }
    .nav-item svg { width: 22px; height: 22px; }
    .nav-label { font-size: 10px; font-weight: 600; letter-spacing: .5px; text-transform: uppercase; }
    .nav-item.active::after {
      content: ''; position: absolute; top: 0; left: 20%; right: 20%; height: 2px;
      background: var(--eq-cyan); border-radius: 0 0 4px 4px;
    }
    .nav-item.hidden { display: none; }
    .badge {
      position: absolute; top: 6px; right: calc(50% - 18px);
      background: var(--eq-error); color: #fff;
      font-size: 9px; font-weight: 700; min-width: 16px; height: 16px;
      border-radius: 8px; display: flex; align-items: center; justify-content: center; padding: 0 4px;
    }

    /* skeleton */
    .skeleton {
      background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 75%);
      background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 14px;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* toast */
    .toast {
      position: fixed; bottom: calc(var(--nav-h) + 16px); left: 50%;
      transform: translateX(-50%) translateY(20px); z-index: 3000;
      background: rgba(10,22,40,0.97); border-radius: 10px;
      padding: 12px 20px; font-size: 14px; font-weight: 500;
      border: 1px solid rgba(0,229,160,0.3); color: var(--eq-success);
      opacity: 0; transition: all .3s; white-space: nowrap;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.error { border-color: rgba(255,77,109,0.3); color: var(--eq-error); }

    .spinner { width:18px; height:18px; border:2px solid rgba(255,255,255,0.3); border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; display:inline-block; vertical-align:middle; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-logo">

      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
      </svg>
    </div>
    <span>STCGYN</span>
  </div>
  <div class="topbar-right">
    <div class="avatar" id="avatarEl">?</div>
    <button class="btn-logout" onclick="logout()">Sair</button>
  </div>
</div>

<!-- CONTEÚDO -->
<div class="content">
  <div class="page-header">
    <div class="page-title">Pendências</div>
    <div class="page-sub" id="pageSub">Carregando...</div>
  </div>

  <!-- filtros (admin vê todos; fiscal vê só os seus) -->
  <div class="filtros hidden" id="filtrosWrap">
    <button class="filtro-btn active" onclick="setFiltro('todos', this)">Todos</button>
    <button class="filtro-btn" onclick="setFiltro('pendente', this)">Pendentes</button>
    <button class="filtro-btn" onclick="setFiltro('concluido', this)">Concluídos</button>
  </div>

  <!-- sumário -->
  <div class="summary-row" id="summaryRow">
    <div class="summary-card total">
      <div class="summary-val" id="sumTotal">—</div>
      <div class="summary-label">Total</div>
    </div>
    <div class="summary-card pendente">
      <div class="summary-val" id="sumPendente">—</div>
      <div class="summary-label">Pendentes</div>
    </div>
    <div class="summary-card concluido">
      <div class="summary-val" id="sumConcluido">—</div>
      <div class="summary-label">Concluídos</div>
    </div>
  </div>

  <!-- lista -->
  <div class="section-header">
    <div class="section-title" id="sectionTitle">Inspeções</div>
    <div class="count-pill" id="countPill">0</div>
  </div>

  <div id="listaInspecoes">
    <div class="skeleton" style="height:130px;margin-bottom:10px;"></div>
    <div class="skeleton" style="height:130px;margin-bottom:10px;"></div>
    <div class="skeleton" style="height:130px;"></div>
  </div>
</div>

<!-- MODAL: concluir inspeção (fiscal) -->
<div class="modal-overlay" id="modalConcluir">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Concluir Inspeção</div>
    <div class="modal-sub" id="modalConcluirSub">Confirme os itens verificados durante a inspeção.</div>

    <div class="checklist" id="checklist">
      <div class="check-item" onclick="toggleCheck(this)">
        <div class="check-box">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <span class="check-text">Postes inspecionados visualmente</span>
      </div>
      <div class="check-item" onclick="toggleCheck(this)">
        <div class="check-box">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <span class="check-text">Cabos e conexões verificados</span>
      </div>
      <div class="check-item" onclick="toggleCheck(this)">
        <div class="check-box">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <span class="check-text">Transformador avaliado</span>
      </div>
      <div class="check-item" onclick="toggleCheck(this)">
        <div class="check-box">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <span class="check-text">Anomalias registradas (se houver)</span>
      </div>
    </div>

    <div class="modal-field" style="margin-bottom:0">
      <div class="modal-label" style="font-size:11px;font-weight:600;letter-spacing:.8px;color:var(--eq-gray);text-transform:uppercase;margin-bottom:6px;">Observações (opcional)</div>
      <textarea class="obs-area" id="obsInspecao" placeholder="Descreva observações relevantes da inspeção..."></textarea>
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModalConcluir()">Cancelar</button>
      <button class="btn-save" id="btnConcluirConfirmar" onclick="confirmarConclusao()">Concluir</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, collection, getDocs, updateDoc, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAuzI6L_8FZhZxt1FyJd-Cw0wA3kvPdWzI",
    authDomain: "anomalias-stcgyn.firebaseapp.com",
    projectId: "anomalias-stcgyn",
    storageBucket: "anomalias-stcgyn.firebasestorage.app",
    messagingSenderId: "247707729519",
    appId: "1:247707729519:web:c3dcaf6d9e707fee59979a"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  let currentUser   = null;
  let currentPerfil = null;
  let todasInspecoes = [];
  let filtroAtivo   = 'todos';
  let concluirInspId = null;

  onAuthStateChanged(auth, async user => {
    if (!user) { window.location.href = 'index.html'; return; }
    const snap = await getDoc(doc(db, 'usuarios', user.uid));
    if (!snap.exists()) { await signOut(auth); sessionStorage.removeItem('userPerfil'); window.location.href = 'index.html'; return; }
    const data = snap.data();
    currentUser   = { uid: user.uid, ...data };
    currentPerfil = data.perfil;
    sessionStorage.setItem('userPerfil', data.perfil);
    document.getElementById('avatarEl').textContent = data.nome.charAt(0).toUpperCase();

    setupPorPerfil();
    await carregarInspecoes();
  });

  window.logout = async () => { await signOut(auth); sessionStorage.removeItem('userPerfil'); window.location.href = 'index.html'; };

  function setupPorPerfil() {
    if (currentPerfil === 'admin') {
      document.getElementById('pageSub').textContent = 'Todas as inspeções delegadas';
      document.getElementById('filtrosWrap').classList.remove('hidden');
      document.getElementById('nav-dashboard').classList.remove('hidden');
      document.getElementById('nav-circuitos').classList.remove('hidden');
    } else if (currentPerfil === 'equipe') {
      document.getElementById('pageSub').textContent = 'Seus serviços programados';
    } else {
      document.getElementById('pageSub').textContent = 'Suas inspeções pendentes';
    }
  }

  async function carregarInspecoes() {
    let q;
    if (currentPerfil === 'admin') {
      q = collection(db, 'inspecoes');
    } else if (currentPerfil === 'equipe') {
      // equipe vê suas anomalias programadas (não inspecoes)
      q = query(collection(db, 'anomalias'),
        where('equipeId', '==', currentUser.uid),
        where('status', '==', 'programado'));
      const snap = await getDocs(q);
      todasInspecoes = snap.docs.map(d => ({
        id: d.id, ...d.data(),
        // adapta campos para reutilizar renderLista
        _tipo: 'anomalia'
      }));
      document.getElementById('sumTotal').textContent    = todasInspecoes.length;
      document.getElementById('sumPendente').textContent  = todasInspecoes.length;
      document.getElementById('sumConcluido').textContent = 0;
      renderListaEquipe();
      return;
    } else {
      q = query(collection(db, 'inspecoes'), where('fiscalId', '==', currentUser.uid));
    }

    const snap = await getDocs(q);
    todasInspecoes = snap.docs.map(d => ({ id: d.id, ...d.data() }));

    // sumário
    const total     = todasInspecoes.length;
    const pendentes = todasInspecoes.filter(i => i.status === 'pendente').length;
    const concluidos = todasInspecoes.filter(i => i.status === 'concluido').length;

    document.getElementById('sumTotal').textContent    = total;
    document.getElementById('sumPendente').textContent  = pendentes;
    document.getElementById('sumConcluido').textContent = concluidos;

    // badge nav
    if (pendentes > 0) {
      const b = document.getElementById('badgeNav');
      b.textContent = pendentes; b.style.display = 'flex';
    }

    renderLista();
  }

  // ── lista de serviços para equipe ──
  function renderListaEquipe() {
    const lista = document.getElementById('listaInspecoes');
    document.getElementById('countPill').textContent = todasInspecoes.length;
    document.getElementById('sectionTitle').textContent = 'Seus serviços programados';

    if (!todasInspecoes.length) {
      lista.innerHTML = `<div class="empty">
        <div class="empty-icon">✅</div>
        <p>Nenhum serviço programado para você no momento.</p>
      </div>`;
      return;
    }

    lista.innerHTML = '';
    todasInspecoes.forEach(a => {
      const criadoEm = a.criadoEm?.toDate ? a.criadoEm.toDate() : null;
      const dataStr = criadoEm ? criadoEm.toLocaleDateString('pt-BR') : '—';
      const tipoLabel = a.tipo === 'poda' ? '✂ Poda' : '⊕ Espaçador';
      lista.innerHTML += `
        <div class="insp-card pendente" onclick="irParaMapa('${a.circuitoId}')">
          <div class="insp-top">
            <div class="insp-nome">${a.circuitoId || '—'}</div>
            <span class="status-pill pendente">⏳ ${tipoLabel}</span>
          </div>
          <div class="insp-meta">
            <div class="meta-item">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
              Endereço: <span>${a.endereco || '—'}</span>
            </div>
            <div class="meta-item">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
              Programado em <span>${dataStr}</span>
            </div>
          </div>
        </div>`;
    });
  }

  function renderLista() {
    const lista = document.getElementById('listaInspecoes');
    let itens = todasInspecoes;

    if (filtroAtivo !== 'todos') {
      itens = itens.filter(i => i.status === filtroAtivo);
    }

    // fiscal vê só pendentes por padrão
    if (currentPerfil === 'fiscal') {
      itens = itens.filter(i => i.status === 'pendente');
    }

    document.getElementById('countPill').textContent = itens.length;
    document.getElementById('sectionTitle').textContent =
      filtroAtivo === 'todos' ? 'Todas as inspeções' :
      filtroAtivo === 'pendente' ? 'Inspeções pendentes' : 'Inspeções concluídas';

    if (itens.length === 0) {
      lista.innerHTML = `<div class="empty">
        <div class="empty-icon">✅</div>
        <p>${currentPerfil === 'fiscal'
          ? 'Você não tem inspeções pendentes!<br/><strong>Tudo em dia por aqui.</strong>'
          : 'Nenhuma inspeção encontrada para o filtro selecionado.'
        }</p>
      </div>`;
      return;
    }

    lista.innerHTML = '';

    itens.forEach(insp => {
      const delegadoEm = insp.delegadoEm?.toDate ? insp.delegadoEm.toDate() : null;
      const diasEmAberto = delegadoEm
        ? Math.floor((Date.now() - delegadoEm.getTime()) / 86400000)
        : null;

      let diasBadgeHtml = '';
      if (diasEmAberto !== null && insp.status === 'pendente') {
        const cls = diasEmAberto <= 3 ? 'ok' : diasEmAberto <= 7 ? 'alerta' : 'critico';
        const label = diasEmAberto === 0 ? 'Hoje' : `${diasEmAberto}d em aberto`;
        diasBadgeHtml = `<span class="dias-badge ${cls}">⏱ ${label}</span>`;
      }

      const dataStr = delegadoEm ? delegadoEm.toLocaleDateString('pt-BR') : '—';
      const urgente = diasEmAberto !== null && diasEmAberto > 7 && insp.status === 'pendente';

      lista.innerHTML += `
        <div class="insp-card ${insp.status} ${urgente ? 'urgente' : ''}" onclick="irParaMapa('${insp.circuitoId}')">
          <div class="insp-top">
            <div class="insp-nome">${insp.circuitoNome || insp.circuitoId}</div>
            <span class="status-pill ${insp.status}">
              ${insp.status === 'pendente' ? '⏳ Pendente' : '✓ Concluído'}
            </span>
          </div>

          <div class="insp-meta">
            <div class="meta-item">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
              Delegado em <span>${dataStr}</span>
            </div>
            ${currentPerfil === 'admin' ? `
            <div class="meta-item">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              Fiscal: <span>${insp.fiscalNome || '—'}</span>
            </div>` : ''}
            ${diasBadgeHtml}
          </div>

          <div class="insp-actions" onclick="event.stopPropagation()">
            <button class="btn-sm btn-outline-sm" onclick="irParaMapa('${insp.circuitoId}')">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/></svg>
              Ver no mapa
            </button>
            ${insp.status === 'pendente' && currentPerfil === 'fiscal' ? `
            <button class="btn-sm btn-success-sm" onclick="openModalConcluir('${insp.id}', '${(insp.circuitoNome||'').replace(/'/g,"\\'")}')">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
              Concluir inspeção
            </button>` : ''}
            ${insp.status === 'concluido' ? `
            <div class="meta-item" style="padding:6px 0">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--eq-success)" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
              <span style="color:var(--eq-success);font-size:12px">
                Concluído em ${insp.concluidoEm?.toDate ? insp.concluidoEm.toDate().toLocaleDateString('pt-BR') : '—'}
              </span>
            </div>` : ''}
          </div>
        </div>`;
    });
  }

  // ── filtros (admin) ──
  window.setFiltro = function(filtro, btn) {
    filtroAtivo = filtro;
    document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderLista();
  };

  // ── ir para mapa com circuito filtrado ──
  window.irParaMapa = function(circuitoId) {
    sessionStorage.setItem('circuitoSelecionado', circuitoId);
    window.location.href = 'mapa.html';
  };

  // ── modal concluir inspeção (fiscal) ──
  window.openModalConcluir = function(inspId, circuitoNome) {
    concluirInspId = inspId;
    document.getElementById('modalConcluirSub').textContent = `Circuito: ${circuitoNome}`;
    // resetar checklist
    document.querySelectorAll('.check-item').forEach(el => el.classList.remove('checked'));
    document.getElementById('obsInspecao').value = '';
    document.getElementById('modalConcluir').classList.add('open');
  };

  window.closeModalConcluir = function() {
    document.getElementById('modalConcluir').classList.remove('open');
  };

  window.toggleCheck = function(el) {
    el.classList.toggle('checked');
  };

  window.confirmarConclusao = async function() {
    const checks = document.querySelectorAll('.check-item');
    const marcados = [...checks].filter(c => c.classList.contains('checked')).length;
    if (marcados < checks.length) {
      return showToast('Marque todos os itens para concluir.', true);
    }
    const obs = document.getElementById('obsInspecao').value.trim();
    const btn = document.getElementById('btnConcluirConfirmar');
    btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';

    try {
      await updateDoc(doc(db, 'inspecoes', concluirInspId), {
        status:       'concluido',
        observacoes:  obs,
        concluidoEm:  serverTimestamp(),
        fiscalId:     currentUser.uid,
        fiscalNome:   currentUser.nome
      });
      closeModalConcluir();
      showToast('Inspeção concluída!');
      await carregarInspecoes();
    } catch {
      showToast('Erro ao concluir. Tente novamente.', true);
    } finally {
      btn.disabled = false; btn.textContent = 'Concluir';
    }
  };

  window.showToast = function(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast' + (isError ? ' error' : '') + ' show';
    setTimeout(() => t.classList.remove('show'), 3000);
  };

  if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(() => {});
</script>

</body>
</html>
