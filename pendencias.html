<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <meta http-equiv="Pragma" content="no-cache"/>
  <meta http-equiv="Expires" content="0"/>
  <title>Anomalias STCGYN - Pendencias</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bd:#0a1628;--bm:#1a56c4;--cy:#00aaff;--pm:#7c3fc0;
      --wh:#f0f4ff;--gr:#8a9bbf;--er:#ff4d6d;--su:#00e5a0;--wa:#ffb300;
      --nh:64px;--th:56px;
    }
    html,body{height:100%;font-family:'Barlow',sans-serif;background:var(--bd);color:var(--wh);-webkit-tap-highlight-color:transparent;overflow-x:hidden}
    .topbar{position:fixed;top:0;left:0;right:0;z-index:1000;height:var(--th);background:rgba(10,22,40,.97);border-bottom:1px solid rgba(0,170,255,.15);backdrop-filter:blur(16px);display:flex;align-items:center;justify-content:space-between;padding:0 16px;gap:10px}
    .tlogo{display:flex;align-items:center;gap:8px}
    .ticon{width:32px;height:32px;background:linear-gradient(135deg,var(--bm),var(--pm));border-radius:8px;display:flex;align-items:center;justify-content:center}
    .ticon svg{width:16px;height:16px}
    .tname{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;letter-spacing:1px;background:linear-gradient(90deg,#fff,var(--cy));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .tright{display:flex;align-items:center;gap:8px}
    .avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--bm),var(--pm));display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700}
    .btn-sair{background:none;border:1px solid rgba(255,77,109,.3);border-radius:7px;padding:6px 8px;color:var(--er);cursor:pointer;font-size:11px;font-weight:600}
    .content{margin-top:var(--th);margin-bottom:var(--nh);padding:20px 16px}
    .page-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;background:linear-gradient(90deg,#fff,var(--cy));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .page-sub{font-size:13px;color:var(--gr);margin-top:2px;margin-bottom:20px}
    .filtros{display:flex;gap:8px;margin-bottom:20px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
    .filtros::-webkit-scrollbar{display:none}
    .filtros.hidden{display:none}
    .fbtn{padding:7px 14px;border-radius:20px;white-space:nowrap;font-family:'Barlow',sans-serif;font-size:13px;font-weight:600;cursor:pointer;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:var(--gr);transition:all .2s}
    .fbtn.active{background:rgba(0,170,255,.12);border-color:rgba(0,170,255,.35);color:var(--cy)}
    .sumrow{display:flex;gap:10px;margin-bottom:20px}
    .sumcard{flex:1;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:14px 12px;display:flex;flex-direction:column;align-items:center;gap:4px}
    .sumcard.p{border-color:rgba(255,179,0,.2)}
    .sumcard.c{border-color:rgba(0,229,160,.2)}
    .sumval{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:700}
    .sumcard.t .sumval{color:var(--cy)}
    .sumcard.p .sumval{color:var(--wa)}
    .sumcard.c .sumval{color:var(--su)}
    .sumlbl{font-size:11px;color:var(--gr);text-transform:uppercase;letter-spacing:.6px;text-align:center}
    .sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
    .sec-ttl{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:.8px;color:var(--gr);text-transform:uppercase}
    .pill{background:rgba(0,170,255,.1);border:1px solid rgba(0,170,255,.2);border-radius:20px;padding:2px 10px;font-size:12px;font-weight:700;color:var(--cy)}
    .card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:16px;margin-bottom:10px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
    .card:hover{border-color:rgba(0,170,255,.25);transform:translateY(-1px)}
    .card.pendente{border-left:3px solid var(--wa)}
    .card.concluido{border-left:3px solid var(--su)}
    .card.urgente::after{content:'';position:absolute;top:0;right:0;width:0;height:0;border-style:solid;border-width:0 20px 20px 0;border-color:transparent var(--er) transparent transparent}
    .ctop{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:10px}
    .cnome{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;line-height:1.2;background:linear-gradient(90deg,#fff,var(--cy));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .spill{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;flex-shrink:0;font-size:11px;font-weight:700;letter-spacing:.4px;text-transform:uppercase}
    .spill.pendente{background:rgba(255,179,0,.12);color:var(--wa);border:1px solid rgba(255,179,0,.25)}
    .spill.concluido{background:rgba(0,229,160,.12);color:var(--su);border:1px solid rgba(0,229,160,.25)}
    .cmeta{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:12px}
    .mi{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--gr)}
    .mi svg{width:13px;height:13px;flex-shrink:0}
    .mi span{color:var(--wh)}
    .dbadge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:700}
    .dbadge.ok{background:rgba(0,229,160,.1);color:var(--su)}
    .dbadge.alerta{background:rgba(255,179,0,.12);color:var(--wa)}
    .dbadge.critico{background:rgba(255,77,109,.12);color:var(--er)}
    .cacts{display:flex;gap:8px;flex-wrap:wrap}
    .bsm{padding:8px 14px;border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;cursor:pointer;border:none;transition:opacity .2s,transform .15s;display:flex;align-items:center;gap:6px}
    .bsm:active{transform:scale(.97)}
    .bsm:hover{opacity:.85}
    .b-out{background:transparent;border:1px solid rgba(0,170,255,.3);color:var(--cy)}
    .b-suc{background:linear-gradient(135deg,#1a8c4e,#0d6e3b);color:#fff}
    .b-dan{background:transparent;border:1px solid rgba(255,77,109,.3);color:var(--er)}
    .empty{text-align:center;padding:60px 20px;color:var(--gr)}
    .empty-icon{font-size:48px;margin-bottom:12px}
    .empty p{font-size:14px;line-height:1.6}
    .mover{position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
    .mover.open{opacity:1;pointer-events:all}
    .modal{width:100%;max-width:520px;background:#0d1f3c;border:1px solid rgba(0,170,255,.2);border-radius:20px 20px 0 0;padding:24px 20px 36px;transform:translateY(100%);transition:transform .35s cubic-bezier(.16,1,.3,1);max-height:85vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
    .mover.open .modal{transform:translateY(0)}
    .mhdl{width:40px;height:4px;background:rgba(255,255,255,.15);border-radius:2px;margin:0 auto 20px}
    .mttl{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;margin-bottom:6px;background:linear-gradient(90deg,#fff,var(--cy));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .mttl.danger{background:none;-webkit-text-fill-color:var(--er)}
    .msub{font-size:13px;color:var(--gr);margin-bottom:20px;line-height:1.5}
    .mobs-lbl{font-size:11px;font-weight:600;letter-spacing:.8px;color:var(--gr);text-transform:uppercase;margin-bottom:6px;display:block}
    .obs{width:100%;padding:12px 14px;min-height:80px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:var(--wh);font-family:'Barlow',sans-serif;font-size:14px;resize:none;outline:none}
    .obs:focus{border-color:var(--cy)}
    .obs::placeholder{color:rgba(138,155,191,.5)}
    .chklist{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
    .chi{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:12px 14px;cursor:pointer;transition:all .2s}
    .chi.checked{background:rgba(0,229,160,.06);border-color:rgba(0,229,160,.2)}
    .chbox{width:20px;height:20px;border-radius:6px;flex-shrink:0;border:2px solid rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;transition:all .2s}
    .chi.checked .chbox{background:var(--su);border-color:var(--su)}
    .chtxt{font-size:14px;font-weight:500}
    .macts{display:flex;gap:10px;margin-top:16px}
    .bcnl{flex:1;padding:13px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:var(--gr);font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer}
    .bsav{flex:2;padding:13px;background:linear-gradient(135deg,#1a8c4e,#0d6e3b);border:none;border-radius:10px;color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer}
    .bsav:disabled{opacity:.5;cursor:not-allowed}
    .botnav{position:fixed;bottom:0;left:0;right:0;z-index:1000;height:var(--nh);background:rgba(10,22,40,.97);border-top:1px solid rgba(0,170,255,.15);backdrop-filter:blur(16px);display:flex;align-items:center}
    .ni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:8px 4px;min-height:44px;cursor:pointer;border:none;background:none;color:var(--gr);transition:color .2s;position:relative}
    .ni.active{color:var(--cy)}
    .ni svg{width:22px;height:22px}
    .nlbl{font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
    .ni.active::after{content:'';position:absolute;top:0;left:20%;right:20%;height:2px;background:var(--cy);border-radius:0 0 4px 4px}
    .ni.hidden{display:none}
    .sk{background:linear-gradient(90deg,rgba(255,255,255,.04) 25%,rgba(255,255,255,.08) 50%,rgba(255,255,255,.04) 75%);background-size:200% 100%;animation:sh 1.5s infinite;border-radius:14px}
    @keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}
    .toast{position:fixed;bottom:calc(var(--nh) + 16px);left:50%;transform:translateX(-50%) translateY(20px);z-index:3000;background:rgba(10,22,40,.97);border-radius:10px;padding:12px 20px;font-size:14px;font-weight:500;border:1px solid rgba(0,229,160,.3);color:var(--su);opacity:0;transition:all .3s;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.4)}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .toast.error{border-color:rgba(255,77,109,.3);color:var(--er)}
    .spin{width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;display:inline-block;vertical-align:middle}
    @keyframes sp{to{transform:rotate(360deg)}}
  </style>
</head>

<script type="module">
import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
  getFirestore, doc, getDoc, collection, getDocs,
  updateDoc, deleteDoc, query, where, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const _cfg = {
  apiKey:"AIzaSyAuzI6L_8FZhZxt1FyJd-Cw0wA3kvPdWzI",
  authDomain:"anomalias-stcgyn.firebaseapp.com",
  projectId:"anomalias-stcgyn",
  storageBucket:"anomalias-stcgyn.firebasestorage.app",
  messagingSenderId:"247707729519",
  appId:"1:247707729519:web:c3dcaf6d9e707fee59979a"
};
const app  = getApps().length ? getApp() : initializeApp(_cfg);
const auth = getAuth(app);
const db   = getFirestore(app);

// ---- estado global ----
let cUser   = null;   // {uid, nome, perfil}
let cPerf   = null;   // 'admin' | 'fiscal' | 'equipe'
let dados   = [];     // array de inspecoes/anomalias carregadas
let filtro  = 'todos';
let idConc  = null;
let idCanc  = null;
let pronto  = false;  // flag: auth ja resolveu

// ---- auth ----
const authTimer = setTimeout(() => { if (!pronto) location.href = 'index.html'; }, 8000);

onAuthStateChanged(auth, async (user) => {
  clearTimeout(authTimer);
  if (!user) { location.href = 'index.html'; return; }
  if (pronto) return;
  pronto = true;

  try {
    const snap = await getDoc(doc(db, 'usuarios', user.uid));
    if (!snap.exists()) {
      await signOut(auth);
      sessionStorage.removeItem('userPerfil');
      location.href = 'index.html';
      return;
    }
    const d = snap.data();
    cUser = { uid: user.uid, nome: d.nome || '', perfil: d.perfil || '' };
    cPerf = d.perfil;
    sessionStorage.setItem('userPerfil', cPerf);
    document.getElementById('avatarEl').textContent = (d.nome||'?')[0].toUpperCase();
    setupUI();
    await carregar();
  } catch(e) {
    console.error('init error', e);
    showErr('Erro ao carregar. Recarregue a pagina.');
  }
});

window.doLogout = async () => {
  await signOut(auth);
  sessionStorage.removeItem('userPerfil');
  location.href = 'index.html';
};

// ---- setup por perfil ----
function setupUI() {
  const sub = document.getElementById('pageSub');
  const fw  = document.getElementById('filtrosWrap');
  const nd  = document.getElementById('ni-dash');
  const nc  = document.getElementById('ni-circ');

  if (cPerf === 'admin') {
    sub.textContent = 'Todas as inspecoes delegadas';
    fw.classList.remove('hidden');
    if (nd) nd.classList.remove('hidden');
    if (nc) nc.classList.remove('hidden');
  } else if (cPerf === 'equipe') {
    sub.textContent = 'Seus servicos programados';
  } else {
    sub.textContent = 'Suas inspecoes pendentes';
  }
}

// ---- carregar dados do Firestore ----
async function carregar() {
  showSk();
  try {
    if (cPerf === 'equipe') {
      const snap = await getDocs(query(
        collection(db, 'anomalias'),
        where('equipeId', '==', cUser.uid),
        where('status',   '==', 'programado')
      ));
      dados = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      updSum(dados.length, dados.length, 0);
      renderEquipe();
    } else {
      const q = cPerf === 'admin'
        ? collection(db, 'inspecoes')
        : query(collection(db, 'inspecoes'), where('fiscalId', '==', cUser.uid));
      const snap = await getDocs(q);
      dados = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      const tot  = dados.length;
      const pend = dados.filter(x => x.status === 'pendente').length;
      const conc = dados.filter(x => x.status === 'concluido').length;
      updSum(tot, pend, conc);
      renderLista();
    }
  } catch(e) {
    console.error('carregar error', e);
    showErr('Erro ao buscar dados. Tente recarregar.');
  }
}

function updSum(tot, pend, conc) {
  document.getElementById('sTotal').textContent = tot;
  document.getElementById('sPend').textContent  = pend;
  document.getElementById('sConc').textContent  = conc;
}

// ---- render equipe (anomalias programadas) ----
function renderEquipe() {
  const el = document.getElementById('lista');
  document.getElementById('cntPill').textContent = dados.length;
  document.getElementById('secTtl').textContent  = 'Servicos programados';
  if (!dados.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">ok</div><p>Nenhum servico programado para voce.</p></div>';
    return;
  }
  let h = '';
  dados.forEach(function(a) {
    const dt  = ts(a.criadoEm);
    const tl  = a.tipo === 'poda' ? 'Poda' : a.tipo === 'mux' ? 'Mux' : 'Espacador';
    const cid = safe(a.circuitoId);
    h += '<div class="card pendente" onclick="goMapa(' + q(cid) + ')">'
       + '<div class="ctop"><div class="cnome">' + (a.circuitoId||'-') + '</div>'
       + '<span class="spill pendente">' + tl + '</span></div>'
       + '<div class="cmeta">'
       + '<div class="mi"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>Endereco: <span>' + (a.endereco||'-') + '</span></div>'
       + '<div class="mi"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Programado: <span>' + dt + '</span></div>'
       + '</div></div>';
  });
  el.innerHTML = h;
}

// ---- render fiscal/admin (inspecoes) ----
function renderLista() {
  const el = document.getElementById('lista');
  let itens = dados.slice();

  if (cPerf === 'fiscal') {
    itens = itens.filter(function(x) { return x.status === 'pendente'; });
  } else if (filtro !== 'todos') {
    itens = itens.filter(function(x) { return x.status === filtro; });
  }

  document.getElementById('cntPill').textContent = itens.length;
  document.getElementById('secTtl').textContent  =
    cPerf === 'fiscal'     ? 'Inspecoes pendentes' :
    filtro === 'pendente'  ? 'Inspecoes pendentes' :
    filtro === 'concluido' ? 'Inspecoes concluidas' : 'Todas as inspecoes';

  if (!itens.length) {
    const msg = cPerf === 'fiscal' ? 'Nenhuma inspecao pendente. Tudo em dia!' : 'Nenhuma inspecao encontrada.';
    el.innerHTML = '<div class="empty"><div class="empty-icon">ok</div><p>' + msg + '</p></div>';
    return;
  }

  let h = '';
  itens.forEach(function(insp) {
    const delObj  = insp.delegadoEm && insp.delegadoEm.toDate ? insp.delegadoEm.toDate() : null;
    const dias    = delObj ? Math.floor((Date.now() - delObj.getTime()) / 86400000) : null;
    const dtStr   = delObj ? delObj.toLocaleDateString('pt-BR') : '-';
    const urgente = dias !== null && dias > 7 && insp.status === 'pendente';
    const nome    = insp.circuitoNome || insp.circuitoId || '-';
    const stLbl   = insp.status === 'pendente' ? 'Pendente' : 'Concluido';
    const cid     = safe(insp.circuitoId);
    const iid     = safe(insp.id);
    const iNome   = safe(insp.circuitoNome || '');

    let dBadge = '';
    if (dias !== null && insp.status === 'pendente') {
      const cls = dias <= 3 ? 'ok' : dias <= 7 ? 'alerta' : 'critico';
      const lbl = dias === 0 ? 'Hoje' : dias + 'd em aberto';
      dBadge = '<span class="dbadge ' + cls + '">' + lbl + '</span>';
    }

    let fiscMeta = '';
    if (cPerf === 'admin') {
      fiscMeta = '<div class="mi"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Fiscal: <span>' + (insp.fiscalNome || '-') + '</span></div>';
    }

    let btnAcao = '';
    if (insp.status === 'pendente' && cPerf === 'fiscal') {
      btnAcao = '<button class="bsm b-suc" onclick="abreMConc(' + q(iid) + ',' + q(iNome) + ')">'
              + '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>Concluir</button>';
    } else if (insp.status === 'pendente' && cPerf === 'admin') {
      btnAcao = '<button class="bsm b-dan" onclick="abreMCanc(' + q(iid) + ',' + q(iNome) + ')">'
              + '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>Cancelar</button>';
    }

    let concInfo = '';
    if (insp.status === 'concluido') {
      const dtC = insp.concluidoEm && insp.concluidoEm.toDate ? insp.concluidoEm.toDate().toLocaleDateString('pt-BR') : '-';
      concInfo = '<div class="mi" style="padding:6px 0"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--su)" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg><span style="color:var(--su);font-size:12px">Concluido em ' + dtC + '</span></div>';
    }

    h += '<div class="card ' + insp.status + (urgente ? ' urgente' : '') + '" onclick="goMapa(' + q(cid) + ')">'
       + '<div class="ctop"><div class="cnome">' + nome + '</div><span class="spill ' + insp.status + '">' + stLbl + '</span></div>'
       + '<div class="cmeta">'
       + '<div class="mi"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Delegado: <span>' + dtStr + '</span></div>'
       + fiscMeta + dBadge
       + '</div>'
       + '<div class="cacts" onclick="event.stopPropagation()">'
       + '<button class="bsm b-out" onclick="goMapa(' + q(cid) + ')">'
       + '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/></svg>Ver no mapa</button>'
       + btnAcao + concInfo
       + '</div></div>';
  });

  el.innerHTML = h;
}

// ---- helpers ----
function safe(s) { return String(s || ''); }
function q(s)    { return "'" + safe(s).split("'").join("\'") + "'"; }
function ts(t)   { return t && t.toDate ? t.toDate().toLocaleDateString('pt-BR') : '-'; }
function showSk() {
  document.getElementById('lista').innerHTML =
    '<div class="sk" style="height:130px;margin-bottom:10px"></div>'
    + '<div class="sk" style="height:130px;margin-bottom:10px"></div>'
    + '<div class="sk" style="height:130px"></div>';
}
function showErr(msg) {
  document.getElementById('lista').innerHTML = '<div class="empty"><div class="empty-icon">x</div><p>' + msg + '</p></div>';
}

// ---- filtros ----
window.setFiltro = function(f, btn) {
  filtro = f;
  document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderLista();
};

window.goMapa = function(id) {
  if (id) sessionStorage.setItem('circuitoSelecionado', id);
  location.href = 'mapa.html';
};

// ---- modal concluir ----
window.abreMConc = function(id, nome) {
  idConc = id;
  document.getElementById('mConcluirSub').textContent = 'Circuito: ' + nome;
  document.querySelectorAll('.chi').forEach(el => el.classList.remove('checked'));
  document.getElementById('obsConc').value = '';
  document.getElementById('mConcluir').classList.add('open');
};
window.fechaMConc = function() { document.getElementById('mConcluir').classList.remove('open'); };
window.togCheck   = function(el) { el.classList.toggle('checked'); };

window.confirmConc = async function() {
  const checks   = document.querySelectorAll('.chi');
  const marcados = [...checks].filter(c => c.classList.contains('checked')).length;
  if (marcados < checks.length) { showToast('Marque todos os itens.', true); return; }
  const obs = document.getElementById('obsConc').value.trim();
  const btn = document.getElementById('btnConc');
  btn.disabled = true; btn.innerHTML = '<span class="spin"></span>';
  try {
    await updateDoc(doc(db, 'inspecoes', idConc), {
      status: 'concluido', observacoes: obs,
      concluidoEm: serverTimestamp(),
      fiscalId: cUser.uid, fiscalNome: cUser.nome
    });
    fechaMConc();
    showToast('Inspecao concluida!');
    pronto = false;
    await carregar();
  } catch(e) { showToast('Erro ao concluir.', true); }
  finally { btn.disabled = false; btn.textContent = 'Concluir'; }
};

// ---- modal cancelar ----
window.abreMCanc = function(id, nome) {
  idCanc = id;
  document.getElementById('mCancelarSub').textContent = 'Circuito: ' + nome;
  document.getElementById('obsCanc').value = '';
  document.getElementById('mCancelar').classList.add('open');
};
window.fechaMCanc = function() { document.getElementById('mCancelar').classList.remove('open'); };

window.confirmCanc = async function() {
  const motivo = document.getElementById('obsCanc').value.trim();
  if (!motivo) { showToast('Informe o motivo.', true); return; }
  const btn = document.getElementById('btnCanc');
  btn.disabled = true; btn.innerHTML = '<span class="spin"></span>';
  try {
    await deleteDoc(doc(db, 'inspecoes', idCanc));
    fechaMCanc();
    showToast('Inspecao cancelada.');
    pronto = false;
    await carregar();
  } catch(e) { showToast('Erro ao cancelar.', true); }
  finally { btn.disabled = false; btn.textContent = 'Cancelar inspecao'; }
};

// ---- toast ----
window.showToast = function(msg, isErr) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isErr ? ' error' : '') + ' show';
  setTimeout(() => t.classList.remove('show'), 3000);
};

if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(() => {});
</script>
